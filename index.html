<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date Invite 💌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeccf);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
      position: relative;
    }
    .app-container {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 2;
    }
    .card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(4px);
    }
    .screen {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .screen.active {
      display: block;
    }
    h1 {
      margin-top: 0;
      color: #d63384;
      font-size: 2rem;
      line-height: 1.25;
      font-family: 'Playfair Display', serif;
    }
    .subtitle {
      color: #666;
      margin-bottom: 18px;
      font-size: 1rem;
    }
    .emoji {
      font-size: 4rem;
      margin: 18px 0 22px;
    }
    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      min-height: 70px;
      position: relative;
    }
    .btn {
      border: none;
      border-radius: 16px;
      padding: 13px 26px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      font-family: 'Lato', sans-serif;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }
    .yes-btn {
      background: #ff4d88;
      color: white;
    }
    .yes-btn:hover {
      background: #f03c79;
    }
    .no-btn {
      background: #ececec;
      color: #333;
      position: relative;
    }
    .tiny-text {
      margin-top: 16px;
      color: #777;
      font-size: 0.95rem;
    }
    .form-group {
      text-align: left;
      margin-top: 16px;
    }
    label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      color: #333;
    }
    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 12px;
      font-size: 1rem;
      outline: none;
      font-family: inherit;
    }
    input:focus,
    select:focus,
    textarea:focus {
      border-color: #ff7aa8;
      box-shadow: 0 0 0 3px rgba(255, 122, 168, 0.15);
    }
    textarea {
      resize: vertical;
    }
    .full-btn {
      width: 100%;
      margin-top: 22px;
    }
    .hidden {
      display: none;
    }
    .summary-box {
      text-align: left;
      background: #fff6fb;
      border: 1px solid #ffd0e1;
      border-radius: 18px;
      padding: 18px;
      color: #444;
      line-height: 1.8;
      margin-top: 18px;
    }
    .summary-box strong {
      color: #d63384;
    }
    .background-hearts::before,
    .background-hearts::after {
      content: "💖 💕 💗 💓 💞";
      position: fixed;
      font-size: 1.5rem;
      opacity: 0.18;
      white-space: nowrap;
      pointer-events: none;
    }
    .background-hearts::before {
      top: 10%;
      left: -20%;
      animation: floatAcross 18s linear infinite;
    }
    .background-hearts::after {
      bottom: 14%;
      right: -20%;
      animation: floatAcrossReverse 20s linear infinite;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes floatAcross {
      from { transform: translateX(0); }
      to { transform: translateX(140vw); }
    }
    @keyframes floatAcrossReverse {
      from { transform: translateX(0); }
      to { transform: translateX(-140vw); }
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.65rem; }
      .emoji { font-size: 3.2rem; }
      .card { padding: 24px 18px; }
      .btn { width: 100%; }
      .button-row {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body class="background-hearts">

<div class="app-container">
  <div class="card">

    <!-- SCREEN 1 -->
    <div id="screen1" class="screen active">
      <h1>Do you want to go on a date with me? 💌</h1>
      <div class="emoji">🥺</div>
      <p class="subtitle">Please say yes…</p>
      <div class="button-row">
        <button id="yesBtn" class="btn yes-btn">Yes 💖</button>
        <button id="noBtn" class="btn no-btn">No 😶</button>
      </div>
      <p class="tiny-text">The no button is a little… shy 😏</p>
    </div>

    <!-- SCREEN 2 -->
    <div id="screen2" class="screen">
      <h1>Yayyy 💕</h1>
      <div class="emoji">🎉</div>
      <p class="subtitle">I knew you'd say yes! Now let's plan it~</p>
      <button id="planBtn" class="btn yes-btn full-btn">Let's plan it ✨</button>
    </div>

    <!-- SCREEN 3 -->
    <div id="screen3" class="screen">
      <h1>Plan our date ✨</h1>
      <p class="subtitle">Tell me everything 🌸</p>

      <div class="form-group">
        <label for="time">When are you available? 🗓️</label>
        <input type="text" id="time" placeholder="e.g. Saturday afternoon">
      </div>

      <div class="form-group">
        <label for="place">Where should we go? 📍</label>
        <select id="place">
          <option value="">Choose a place…</option>
          <option>Park 🌳</option>
          <option>Arcade 🎮</option>
          <option>Billiard 🎱</option>
          <option>Tennis 🎾 (Teach me)</option>
          <option>Museum 🏛️</option>
          <option value="other">Other 💭</option>
        </select>
      </div>

      <div id="otherPlaceWrap" class="form-group hidden">
        <label for="otherPlace">Your idea…</label>
        <input type="text" id="otherPlace" placeholder="Tell me your plan!">
      </div>

      <div class="form-group">
        <label for="message">Any message for me? 💬</label>
        <textarea id="message" rows="3" placeholder="Anything you want to say~"></textarea>
      </div>

      <button id="finishBtn" class="btn yes-btn full-btn">Finish 💖</button>
    </div>

    <!-- SCREEN 4 -->
    <div id="screen4" class="screen">
      <h1>It's a date! 💖</h1>
      <div class="emoji">🥰</div>
      <p class="subtitle">Can't wait to see you~</p>
      <div id="result" class="summary-box"></div>
    </div>

  </div>
</div>

<script>
  const screen1 = document.getElementById("screen1");
  const screen2 = document.getElementById("screen2");
  const screen3 = document.getElementById("screen3");
  const screen4 = document.getElementById("screen4");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const planBtn = document.getElementById("planBtn");
  const finishBtn = document.getElementById("finishBtn");
  const place = document.getElementById("place");
  const otherPlace = document.getElementById("otherPlace");
  const otherPlaceWrap = document.getElementById("otherPlaceWrap");
  const result = document.getElementById("result");

  const texts = ["No 😶", "Are you sure? 😳", "Really? 😏", "Last chance 😈"];

  function showScreen(screenToShow) {
    [screen1, screen2, screen3, screen4].forEach((s) => s.classList.remove("active"));
    screenToShow.classList.add("active");
  }

  yesBtn.addEventListener("click", () => showScreen(screen2));
  planBtn.addEventListener("click", () => showScreen(screen3));

  place.addEventListener("change", function () {
    if (this.value === "other") {
      otherPlaceWrap.classList.remove("hidden");
    } else {
      otherPlaceWrap.classList.add("hidden");
      otherPlace.value = "";
    }
  });

  // Impossible moving No button
  document.addEventListener("mousemove", (e) => {
    if (!screen1.classList.contains("active")) return;
    const rect = noBtn.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < 120) {
      const moveX = (Math.random() - 0.5) * 320;
      const moveY = (Math.random() - 0.5) * 220;
      noBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;
      noBtn.textContent = texts[Math.floor(Math.random() * texts.length)];
    }
  });

  finishBtn.addEventListener("click", async () => {
    const time = document.getElementById("time").value.trim();
    const placeValue = place.value === "other" ? otherPlace.value.trim() : place.value;
    const message = document.getElementById("message").value.trim();

    if (!time) { alert("Please enter your available time 🕐"); return; }
    if (!place.value) { alert("Please choose a place 📍"); return; }
    if (place.value === "other" && !otherPlace.value.trim()) {
      alert("Please write your place idea 💭"); return;
    }

    // Disable button while submitting
    finishBtn.disabled = true;
    finishBtn.textContent = "Sending 💌…";

    try {
      const response = await fetch("https://formspree.io/f/xykbynbv", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          time: time,
          place: placeValue,
          message: message || "No message 😏"
        })
      });

      if (!response.ok) throw new Error("Submission failed");

      result.innerHTML = `
        <p><strong>Time:</strong> ${time}</p>
        <p><strong>Place:</strong> ${placeValue}</p>
        <p><strong>Message:</strong> ${message || "No message 😏"}</p>
      `;
      showScreen(screen4);

    } catch (err) {
      alert("Oops! Something went wrong sending your answer 😢 Please try again.");
    } finally {
      finishBtn.disabled = false;
      finishBtn.textContent = "Finish 💖";
    }
  });
</script>

</body>
</html>
